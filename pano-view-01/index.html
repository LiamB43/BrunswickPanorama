<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css

  https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.jsscript>

  <style>
    html, body {
      margin: 0;
      height: 100%;
    }
    #pano {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

<div id="pano"></div>

<script>
  pannellum.viewer('pano', {
    "type": "equirectangular",
    "panorama": "pano.jpg",
    "autoLoad": true,
    "yaw": 0,
    "pitch": 0,
    "hfov": 105
  });
</script>

</body>
</html>
